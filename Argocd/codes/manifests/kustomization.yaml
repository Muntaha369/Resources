apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - mongodb-pv.yaml
  - mongodb-pvc.yaml
  - mongodb-deployment.yaml
  - mongodb-service.yaml
  - server-deployment.yaml
  - server-service.yaml
  - client-deployment.yaml
  - client-service.yaml
images:
  - name: muntaha69/todo-server
    newTag: "1.0.0"      # image updater will auto-update this
  - name: muntaha69/todo-client
    newTag: "1.0.2"      # image updater will auto-update this